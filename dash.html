<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pointage</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>
:root{
 --primary:#00f0ff;
 --bg:#0e0e0e;
 --card:#1a1a1a;
 --danger:#ff4d4d;
 --success:#00ff00;
}

body{
 font-family:Segoe UI,sans-serif;
 background:var(--bg);
 color:#fff;
 margin:0;
 padding:20px
}

h1{text-align:center;color:var(--primary)}

#table-container{
 width:98%;
 margin:auto;
 background:var(--card);
 padding:20px;
 border-radius:12px
}

/* CONTROLS */
#controls{
 display:flex;
 flex-wrap:wrap;
 gap:10px;
 background:#222;
 padding:15px;
 border-radius:8px;
 position:sticky;
 top:0;
 z-index:100
}

input,select,button{
 background:#333;
 border:1px solid #444;
 color:white;
 padding:10px;
 border-radius:6px
}

button{
 background:var(--primary);
 color:#000;
 font-weight:bold;
 border:none;
 cursor:pointer
}

.btn-excel{
 background:#217346;
 color:#fff;
 margin-left:auto
}

/* LOADER */
#loader{
 display:none;
 margin:20px auto;
 width:50px;
 height:50px;
 border:5px solid rgba(0,240,255,.1);
 border-top:5px solid var(--primary);
 border-radius:50%;
 animation:spin 1s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}

/* TABLE PC */
.table-wrapper{
 overflow-x:auto;
 border:1px solid #333
}

table{
 border-collapse:separate;
 border-spacing:0;
 width:100%
}

th,td{
 padding:12px;
 border:1px solid #333;
 white-space:nowrap;
 text-align:center;
 background:var(--card)
}

thead tr:first-child th{
 position:sticky;
 top:0;
 z-index:20;
 background:#222
}

thead tr:nth-child(2) th{
 position:sticky;
 top:48px;
 z-index:10;
 background:#1f1f1f
}

tbody td:first-child{
 position:sticky;
 left:0;
 z-index:5;
 background:#1a1a1a;
 border-right:3px solid var(--primary);
 text-align:left;
 min-width:200px
}

/* BADGES */
.badge{
 padding:5px 10px;
 border-radius:4px;
 font-weight:bold
}

.color-present{
 color:var(--success);
 border:1px solid var(--success);
 background:rgba(0,255,0,.12)
}

.color-absent{
 color:var(--danger);
 border:1px solid var(--danger);
 background:rgba(255,77,77,.15)
}

.stg-link{
 cursor:pointer;
 color:var(--primary);
 text-decoration:underline
}

/* MODAL */
#overlay{
 display:none;
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.85);
 z-index:999
}

#modal{
 display:none;
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:#222;
 padding:30px;
 border-radius:15px;
 border:2px solid var(--primary);
 z-index:1000;
 text-align:center
}

/* MOBILE */
.mobile-cards{display:none}

@media(max-width:768px){

 body{padding:10px}
 h1{font-size:20px}

 #controls{flex-direction:column}

 .table-wrapper{display:none}

 .mobile-cards{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:15px
 }

 .card-stagiaire{
  background:#1b1b1b;
  border:1px solid #333;
  border-radius:12px;
  padding:12px
 }

 .card-header{
  font-weight:bold;
  font-size:16px;
  color:var(--primary)
 }

 .card-date{
  margin-top:8px;
  font-size:13px;
  color:#aaa;
  border-top:1px solid #333;
  padding-top:6px
 }

 .slot{
  display:flex;
  justify-content:space-between;
  font-size:13px
 }
}
</style>
</head>

<body>

<h1>Dashboard Pointage</h1>

<div id="table-container">

 <div id="controls">
  <input type="date" id="start">
  <input type="date" id="end">
  <select id="spec"><option value="">-- Spécialité --</option></select>
  <input id="search" placeholder="Nom...">
  <button id="filter">🔍 FILTRER</button>
  <button class="btn-excel" onclick="exportToExcel()">📊 EXPORT</button>
 </div>

 <div id="loader"></div>

 <div class="table-wrapper">
  <table id="main-table">
   <thead id="table-head"></thead>
   <tbody id="data-body"></tbody>
  </table>
 </div>

 <div id="mobile-view" class="mobile-cards"></div>

</div>

<div id="overlay"></div>
<div id="modal">
 <h2 id="m-nom"></h2>
 <p>Présences : <span id="m-pres" style="color:var(--success)"></span></p>
 <p>Absences : <span id="m-abs" style="color:var(--danger)"></span></p>
 <p>Taux : <span id="m-taux"></span>%</p>
 <button onclick="closeModal()">Fermer</button>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbz8eyvMcFyAVjeRTWjhtcNun0D2MP4M-bn6kS1Q28e2pPzwqT6XIhwjGCie--FYpV5D/exec";
const creneaux=["08-10","10-12","13:30-15:30","15:30-16:30"];

let toutesLesDonnees=[];

const tableHead=document.getElementById("table-head");
const tableBody=document.getElementById("data-body");
const spec=document.getElementById("spec");
const start=document.getElementById("start");
const end=document.getElementById("end");
const search=document.getElementById("search");
const loader=document.getElementById("loader");
const mobileView=document.getElementById("mobile-view");

function normalize(v){
 return (v||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function formatDateAvecJour(d){
 const j=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
 const [dd,mm,yy]=d.split("/");
 const dt=new Date(yy,mm-1,dd);
 return `${j[dt.getDay()]} ${d}`;
}

function getDatesBetween(s,e){
 const dates=[];
 let d=new Date(s);
 const end=new Date(e);
 while(d<=end){
  dates.push(
   String(d.getDate()).padStart(2,"0")+"/"+
   String(d.getMonth()+1).padStart(2,"0")+"/"+
   d.getFullYear()
  );
  d.setDate(d.getDate()+1);
 }
 return dates;
}

async function chargerInitial(){
 const r=await fetch(API_URL);
 const d=await r.json();
 if(d.specialites) d.specialites.forEach(s=>spec.add(new Option(s,s)));
}

async function filtrer(){
 if(!start.value||!end.value) return alert("Choisir les dates");
 loader.style.display="block";
 const r=await fetch(`${API_URL}?start=${start.value}&end=${end.value}&spec=${spec.value}`);
 const d=await r.json();
 toutesLesDonnees=d.pointage||[];
 loader.style.display="none";
 appliquerFiltres();
}

function appliquerFiltres(){
 let d=toutesLesDonnees;
 if(search.value) d=d.filter(x=>x.nom.toLowerCase().includes(search.value.toLowerCase()));
 afficherDonnees(d);
}

function afficherDonnees(data){
 const dates=getDatesBetween(start.value,end.value);
 const grp={};

 data.forEach(x=>{
  if(!grp[x.id]) grp[x.id]={nom:x.nom,id:x.id,etats:{}};
  grp[x.id].etats[x.date+"_"+x.horaire]=x.etat;
 });

 // Détecter les jours ayant au moins un pointage
 const joursActifs = {};
 dates.forEach(d => {
  joursActifs[d] = data.some(x => x.date === d && (normalize(x.etat).includes("present") || normalize(x.etat).includes("absent")));
 });

 /* TABLE PC */
 let h1=`<tr><th rowspan="2">Nom</th>`;
 let h2=`<tr>`;
 
 dates.forEach(d=>{
  if(joursActifs[d]){
   h1+=`<th colspan="${creneaux.length}">${formatDateAvecJour(d)}</th>`;
   creneaux.forEach(c=> h2+=`<th>${c}</th>`);
  } else {
   h1+=`<th rowspan="2" style="background:#111;color:#666">${formatDateAvecJour(d)}</th>`;
  }
 });
 h1+=`</tr>`; h2+=`</tr>`;
 tableHead.innerHTML=h1+h2;

 tableBody.innerHTML=Object.values(grp).map(g=>{
  let r=`<tr><td class="stg-link" onclick="voirDetails('${g.id}')">${g.nom}</td>`;
  dates.forEach(d=>{
   if(joursActifs[d]){
    creneaux.forEach(c=>{
     const raw=g.etats[d+"_"+c]||"-";
     const v=normalize(raw);
     let css="";
     if(v.includes("present")) css="color-present";
     else if(v.includes("absent")) css="color-absent";
     r+=`<td><span class="badge ${css}">${raw}</span></td>`;
    });
   } else {
    r+=`<td style="background:#111;color:#444">-</td>`;
   }
  });
  return r+="</tr>";
 }).join("");

 /* MOBILE */
 if(window.innerWidth<=768){
  mobileView.innerHTML=Object.values(grp).map(g=>{
   let html=`<div class="card-stagiaire">
    <div class="card-header" onclick="voirDetails('${g.id}')">${g.nom}</div>`;
   dates.forEach(d=>{
    html+=`<div class="card-date">${formatDateAvecJour(d)}</div>`;
    if(joursActifs[d]){
     creneaux.forEach(c=>{
      const raw=g.etats[d+"_"+c]||"-";
      const v=normalize(raw);
      let css="";
      if(v.includes("present")) css="color-present";
      else if(v.includes("absent")) css="color-absent";
      html+=`<div class="slot"><span>${c}</span><span class="badge ${css}">${raw}</span></div>`;
     });
    } else {
     html+=`<div class="slot" style="color:#555 italic"><span>Journée vide</span><span>-</span></div>`;
    }
   });
   return html+="</div>";
  }).join("");
 } else {
  mobileView.innerHTML="";
 }
}

function voirDetails(id){
 const s=toutesLesDonnees.filter(x=>x.id==id);
 let p=0,a=0;
 s.forEach(x=>{
  const v=normalize(x.etat);
  if(v.includes("present")) p++;
  else if(v.includes("absent")) a++;
 });
 const t=(p+a)?((p/(p+a))*100).toFixed(1):0;
 m_nom.textContent=s[0].nom;
 m_pres.textContent=p;
 m_abs.textContent=a;
 m_taux.textContent=t;
 overlay.style.display=modal.style.display="block";
}

function closeModal(){overlay.style.display=modal.style.display="none"}

function exportToExcel(){
 const table=document.getElementById("main-table");
 const wb=XLSX.utils.book_new();
 const ws=XLSX.utils.table_to_sheet(table,{raw:true});

 const range=XLSX.utils.decode_range(ws["!ref"]);
 for(let r=range.s.r+2;r<=range.e.r;r++){
  for(let c=range.s.c+1;c<=range.e.c;c++){
   const cell=ws[XLSX.utils.encode_cell({r,c})];
   if(!cell||!cell.v) continue;
   const v=normalize(cell.v.toString());
   if(v.includes("present")){
    cell.s={fill:{fgColor:{rgb:"C6EFCE"}},font:{bold:true}};
   }else if(v.includes("absent")){
    cell.s={fill:{fgColor:{rgb:"FFC7CE"}},font:{bold:true}};
   }
  }
 }

 XLSX.utils.book_append_sheet(wb,ws,"Pointage");
 XLSX.writeFile(wb,`Pointage_${spec.value}_${start.value}_au_${end.value}.xlsx`,{cellStyles:true});
}

chargerInitial();
filter.onclick=filtrer;
search.oninput=appliquerFiltres;
overlay.onclick=closeModal;
window.addEventListener("resize",appliquerFiltres);
</script>

</body>
</html>
