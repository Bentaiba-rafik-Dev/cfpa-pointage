<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pointage — Période</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0e0e0e;
  color:white;
  margin:0;
  padding:20px;
}
h1{
  text-align:center;
  margin-bottom:20px;
  color:#00f0ff;
}
#table-container{
  width:95%;
  margin:auto;
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 15px #00f0ff33;
}
#controls{
  display:flex;
  flex-wrap: wrap;
  gap:10px;
  justify-content: space-between;
  margin-bottom:15px;
}
#controls > *{
  flex:1;
  min-width:120px;
}
button{
  background:#00f0ff;
  color:#000;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
/* Conteneur scroll */
.table-wrapper{
  overflow-x:auto;
}
table{
  border-collapse:collapse;
  min-width:800px; /* minimum pour éviter rétrécissement trop fort */
}
th, td{
  padding:10px;
  border:1px solid #333;
  text-align:center;
  white-space:nowrap;
}
thead th{
  background:#00f0ff22;
  border-color: aliceblue;
  color:#00f0ff;
}
tbody tr:hover { background-color:#00eeff25; }

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:12px;
  font-weight:bold;
  color:white;
}
.present{ background:#088808; }
.absent{ background:#ff0000; }

/* Mobile responsive */
@media(max-width:600px){
  .table-wrapper{ overflow-x:auto; }
  thead{ display:none; }
  tr{
    display:flex;
    flex-direction:column;
    background:#222;
    margin-bottom:10px;
    padding:10px;
    border-radius:8px;
  }
  td{
    display:flex;
    justify-content:space-between;
  }
  td::before{
    content:attr(data-label);
    color:#00f0ff;
    font-weight:bold;
  }
}
</style>
</head>

<body>

<h1>Dashboard Pointage — Période</h1>

<div id="table-container">

  <div id="controls">
    <input type="date" id="start">
    <input type="date" id="end">
    <select id="spec">
      <option value="">-- Spécialité --</option>
    </select>
    <select id="heure">
      <option value="TOUT">TOUT</option>
      <option>08-10</option>
      <option>10-12</option>
      <option>13:30-15:30</option>
    </select>
    <button id="filter">🔍 Filtrer</button>
    <button id="export">📥 Export CSV</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead id="table-head">
        <tr><th colspan="2">Choisir période + spécialité</th></tr>
      </thead>
      <tbody id="data-body"></tbody>
    </table>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxDSftK4a-I5KUmEwDxu7jdZib7b3muz9HhjS0LFEZTAvydxgsRDzMweTA-dbdytk1G9Q/exec";
let toutesLesDonnees = [];
const creneaux=["08-10","10-12","13:30-15:30"];

async function chargerSpecialites(){
  const res = await fetch(API_URL);
  const data = await res.json();
  const select = document.getElementById("spec");
  data.specialites.forEach(s=>{
    const o=document.createElement("option");
    o.value=s; o.textContent=s;
    select.appendChild(o);
  });
}

function afficherDonnees(data){
  const body=document.getElementById("data-body");
  if(data.length===0){
    document.getElementById("table-head").innerHTML=
      `<tr><th colspan="6">Aucune donnée</th></tr>`;
    body.innerHTML="";
    return;
  }

  const dates=[...new Set(data.map(d=>d.date))].sort((a,b)=>{
    return new Date(a.split("/").reverse().join("-")) - new Date(b.split("/").reverse().join("-"));
  });

  let head = "<tr><th rowspan='2'>Nom</th>";
  dates.forEach(d=>{
    head+=`<th colspan="${creneaux.length}">${d}</th>`;
  });
  head+="</tr><tr>";
  dates.forEach(_=>creneaux.forEach(c=>{
    head+=`<th>${c}</th>`;
  }));
  head+="</tr>";
  document.getElementById("table-head").innerHTML=head;

  const grp={};
  data.forEach(d=>{
    if(!grp[d.id]) grp[d.id]={nom:d.nom,etats:{}};
    grp[d.id].etats[d.date+"_"+d.horaire]=d.etat;
  });

  let html="";
  for(const id in grp){
    html+=`<tr><td>${grp[id].nom}</td>`;
    dates.forEach(d=>{
      creneaux.forEach(c=>{
        const key=d+"_"+c;
        const e=grp[id].etats[key]||"-";
        html+=`<td><span class="badge ${e.toLowerCase()}">${e}</span></td>`;
      });
    });
    html+="</tr>";
  }
  body.innerHTML=html;
}

function filtrerHeureLocal(data){
  const h=document.getElementById("heure").value;
  return h==="TOUT"?data:data.filter(d=>d.horaire===h);
}

async function filtrer(){
  const start=document.getElementById("start").value;
  const end=document.getElementById("end").value;
  const spec=document.getElementById("spec").value;

  if(!start||!end||!spec){
    alert("Choisir dates + spécialité");
    return;
  }

  const res=await fetch(`${API_URL}?start=${start}&end=${end}&spec=${encodeURIComponent(spec)}`);
  const data=await res.json();
  toutesLesDonnees=data.pointage||[];
  afficherDonnees(filtrerHeureLocal(toutesLesDonnees));
}

document.getElementById("filter").onclick=filtrer;
document.getElementById("heure").onchange=()=>afficherDonnees(filtrerHeureLocal(toutesLesDonnees));

document.getElementById("export").onclick=()=>{
  if(!toutesLesDonnees.length) return;
  let csv="ID,Nom,Date,Heure,Etat\n";
  toutesLesDonnees.forEach(d=>{
    csv+=`${d.id},${d.nom},${d.date},${d.horaire},${d.etat}\n`;
  });
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv"}));
  a.download="pointage_periode.csv";
  a.click();
};

chargerSpecialites();
</script>

</body>
</html>
